    <circle cx="12" cy="18" r="0.6" fill="#000"/>
    <circle cx="14" cy="18" r="0.6" fill="#000"/>
    <circle cx="16" cy="18" r="0.6" fill="#000"/>
    <circle cx="17.5" cy="20" r="0.6" fill="#000"/>
  </g>
